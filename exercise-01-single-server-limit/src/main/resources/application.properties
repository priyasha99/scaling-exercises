# =============================================================
# Exercise 01 - Single Server Configuration
# =============================================================
# These settings are INTENTIONALLY constrained to simulate
# a resource-limited server. In production you'd tune these
# based on your instance size. Here we keep them tight so the
# breaking point is reachable with modest load.
# =============================================================

server.port=8080

# --- Tomcat Thread Pool ---
# Only 50 threads to handle requests. Once all 50 are busy,
# new requests queue up. This is the first bottleneck.
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=5
server.tomcat.accept-count=20

# --- Database (H2 in-memory) ---
spring.datasource.url=jdbc:h2:mem:productdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

# --- HikariCP Connection Pool ---
# Only 10 DB connections. When all threads want DB access
# simultaneously, they wait here. This is bottleneck #2.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=30000

# --- JVM will be further constrained in Docker ---
# See Dockerfile for -Xmx256m setting

# --- Actuator (for observing server state) ---
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always
