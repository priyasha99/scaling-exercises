# =============================================================
# Nginx Load Balancer Configuration
# =============================================================
# This sits in front of multiple identical app servers and
# distributes requests across them using round-robin.
#
# Key concepts:
#   - upstream: defines the pool of backend servers
#   - round-robin: default strategy, each request goes to the
#     next server in the list
#   - proxy_pass: forwards the request to the upstream pool
# =============================================================

# Match the number of CPU cores available
worker_processes auto;

events {
    # Max simultaneous connections per worker
    worker_connections 1024;
}

http {
    # -------------------------------------------------------
    # Docker's internal DNS resolver.
    # Nginx re-resolves "app" every 10 seconds, so new
    # containers from `docker compose --scale` are discovered
    # automatically without restarting Nginx.
    # -------------------------------------------------------
    resolver 127.0.0.11 valid=10s;

    # -------------------------------------------------------
    # The upstream block defines our backend app servers.
    # Docker Compose DNS resolves "app" to all container IPs
    # when using `deploy.replicas` or `--scale`.
    #
    # max_fails + fail_timeout = passive health checking:
    #   - If a backend fails 2 requests in a row, Nginx marks
    #     it as "down" and stops routing to it
    #   - After 30 seconds, Nginx tries it again
    #   - This prevents routing to containers that are still
    #     starting up (JVM boot, data seeding)
    #
    # How it works with new containers:
    #   1. New container starts, not ready yet
    #   2. Nginx discovers it via DNS (within 10s)
    #   3. Sends a request → connection refused or timeout
    #   4. Sends another → fails again (max_fails=2 reached)
    #   5. Marks it down for 30s
    #   6. After 30s, tries again → app is ready → success!
    #   7. Container enters the rotation
    #
    # Other strategies to discuss with your team:
    #   least_conn;    → send to the server with fewest active connections
    #   ip_hash;       → same client IP always hits the same server
    #                    (useful for sticky sessions, but breaks even distribution)
    # -------------------------------------------------------
    upstream app_servers {
        server app:8080 max_fails=2 fail_timeout=30s;
    }

    # Logging format that includes upstream server address
    # so you can see which backend handled each request
    log_format upstream_log '$remote_addr - [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            'upstream: $upstream_addr '
                            'response_time: $upstream_response_time';

    access_log /var/log/nginx/access.log upstream_log;

    server {
        listen 80;

        # -------------------------------------------------------
        # Health check endpoint for the load balancer itself
        # -------------------------------------------------------
        location /nginx-health {
            return 200 'nginx is running\n';
            add_header Content-Type text/plain;
        }

        # -------------------------------------------------------
        # All API requests are forwarded to the app pool.
        #
        # proxy_next_upstream tells Nginx: if the backend returns
        # an error or times out, try the NEXT server instead of
        # returning the error to the client. Combined with
        # max_fails above, this means:
        #   - Unhealthy backends get skipped quickly
        #   - Clients rarely see errors from backend issues
        #   - Only if ALL backends are down does the client get an error
        # -------------------------------------------------------
        location / {
            proxy_pass http://app_servers;

            # If a backend fails, try the next one
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;

            # Pass original client info to backend
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Timeouts - if a backend is too slow, move on
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }
    }
}
