# =============================================================
# Exercise 03 Part C - PostgreSQL Read Replicas
# =============================================================
# Adds PostgreSQL streaming replication:
#   - 1 primary (handles writes)
#   - 2 replicas (handle reads, stream WAL from primary)
#
# The app uses the "replicas" Spring profile, which activates
# ReadWriteRoutingDataSource to split traffic:
#   - @Transactional(readOnly = true)  → replica
#   - @Transactional                   → primary
#
# Architecture:
#
#   Client --> [ Nginx LB ] --> [ App 1 ] --writes--> [ PG Primary ]
#                            --> [ App 2 ]                  |
#                            --> [ App 3 ] --reads-->  [ PG Replica 1 ]
#                                          --reads-->  [ PG Replica 2 ]
#
# Usage:
#   docker compose -f docker-compose.replicas.yml up --build
# =============================================================

services:
  # -------------------------------------------------------
  # PostgreSQL Primary (writes)
  # -------------------------------------------------------
  postgres-primary:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
      # Replication user for replicas to connect
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c wal_level=replica
      -c max_wal_senders=10
      -c max_replication_slots=4
      -c hot_standby=on
      -c log_min_duration_statement=1000
    volumes:
      - ./postgres/init-primary.sh:/docker-entrypoint-initdb.d/01-init-replication.sh
      - pgdata-primary:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d productdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # -------------------------------------------------------
  # PostgreSQL Replica 1 (reads)
  # -------------------------------------------------------
  # Uses pg_basebackup to clone the primary's data, then
  # streams WAL changes in real time. Read-only.
  # -------------------------------------------------------
  postgres-replica-1:
    image: postgres:16-alpine
    environment:
      # Don't set PGUSER here — it causes pg_isready to try
      # connecting to a database named "replicator" which doesn't exist.
      # The replication credentials are passed directly in the script.
      PGPASSWORD: repl_password
    ports:
      - "5433:5432"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    depends_on:
      postgres-primary:
        condition: service_healthy
    volumes:
      - ./postgres/setup-replica.sh:/setup-replica.sh
      - pgdata-replica1:/var/lib/postgresql/data
    entrypoint: ["/bin/bash", "/setup-replica.sh"]
    command: ["postgres-primary"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d productdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # -------------------------------------------------------
  # PostgreSQL Replica 2 (reads)
  # -------------------------------------------------------
  postgres-replica-2:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: repl_password
    ports:
      - "5434:5432"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    depends_on:
      postgres-primary:
        condition: service_healthy
    volumes:
      - ./postgres/setup-replica.sh:/setup-replica.sh
      - pgdata-replica2:/var/lib/postgresql/data
    entrypoint: ["/bin/bash", "/setup-replica.sh"]
    command: ["postgres-primary"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d productdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # -------------------------------------------------------
  # pgAdmin - Database GUI
  # -------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres-primary:
        condition: service_healthy

  # -------------------------------------------------------
  # Nginx Load Balancer
  # -------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  # -------------------------------------------------------
  # App Servers with read/write routing
  # -------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: replicas
      DB_PRIMARY_HOST: postgres-primary
      DB_REPLICA_HOST: postgres-replica-1
      DB_USER: app
      DB_PASSWORD: app_password
      # Also set default DB_HOST for JPA auto-config (schema creation on primary)
      DB_HOST: postgres-primary
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica-1:
        condition: service_healthy
      postgres-replica-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/products/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

volumes:
  pgdata-primary:
  pgdata-replica1:
  pgdata-replica2:
  pgadmin-data:
