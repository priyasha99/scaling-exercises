# =============================================================
# Exercise 03 Part A/B - Shared PostgreSQL Database
# =============================================================
# Same horizontal scaling setup as Exercise 02, but now all
# app servers connect to ONE shared PostgreSQL database instead
# of each having their own H2 in-memory DB.
#
# This solves the data inconsistency problem but introduces a
# new bottleneck: all servers compete for the same database.
#
# Architecture:
#
#   Client --> [ Nginx LB ] --> [ App 1 ] --\
#                            --> [ App 2 ] ---+--> [ PostgreSQL ]
#                            --> [ App 3 ] --/
#
# Usage:
#   docker compose up --build
#   # Scale app servers (DB stays at 1):
#   docker compose up --scale app=6 --no-recreate -d
# =============================================================

services:
  # -------------------------------------------------------
  # PostgreSQL - The Shared Database
  # -------------------------------------------------------
  # All app servers connect here. This is now the single
  # point of contention. We constrain it to make the
  # bottleneck visible sooner:
  #   - 1 CPU (same as each app server)
  #   - 512MB RAM
  #   - max_connections=50 (tight — 5 servers × 10 = 50)
  # -------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"  # Exposed for debugging with psql
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    # Constrained PostgreSQL settings to surface the bottleneck
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c effective_cache_size=256MB
      -c random_page_cost=1.1
      -c log_min_duration_statement=1000
      -c log_statement=none
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d productdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - pgdata:/var/lib/postgresql/data

  # -------------------------------------------------------
  # Nginx Load Balancer (same as Exercise 02)
  # -------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  # -------------------------------------------------------
  # App Servers (Spring Boot + PostgreSQL)
  # -------------------------------------------------------
  # Same constraints as Exercise 02 (1 CPU, 512MB each).
  # But now they connect to the shared PostgreSQL above
  # instead of an embedded H2 database.
  #
  # Each server creates a HikariCP pool of 10 connections.
  # 3 servers × 10 = 30 connections to PostgreSQL.
  # 6 servers × 10 = 60 > max_connections(50) = ERRORS!
  # -------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      DB_HOST: postgres
      DB_USER: app
      DB_PASSWORD: app_password
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/products/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s  # Longer: JVM startup + DB migration + seeding

volumes:
  pgdata:
