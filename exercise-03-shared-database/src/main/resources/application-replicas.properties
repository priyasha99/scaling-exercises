# =============================================================
# Exercise 03 Part C - Read Replica Configuration
# =============================================================
# When this profile is active, the app uses a custom
# DataSource that routes:
#   - Read-only transactions → replica database
#   - Write transactions → primary database
#
# Activate with: SPRING_PROFILES_ACTIVE=replicas
# =============================================================

# CRITICAL: Exclude DataSourceAutoConfiguration.
# Without this, Spring Boot auto-creates a DataSource from spring.datasource.url
# and Hibernate uses THAT instead of our routing DataSource — meaning all
# queries go to the primary and read replicas sit idle.
# Our DataSourceConfig provides its own @Primary DataSource bean that
# Hibernate will pick up instead.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Disable open-in-view to ensure connections are only acquired
# inside @Transactional methods (where the readOnly flag is set).
spring.jpa.open-in-view=false

# JPA still needs these for Hibernate to know the dialect and DDL strategy
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Primary database (writes)
datasource.primary.jdbc-url=jdbc:postgresql://${DB_PRIMARY_HOST:postgres-primary}:5432/productdb
datasource.primary.username=${DB_USER:app}
datasource.primary.password=${DB_PASSWORD:app_password}
datasource.primary.pool-size=10

# Replica database (reads)
datasource.replica.jdbc-url=jdbc:postgresql://${DB_REPLICA_HOST:postgres-replica-1}:5432/productdb
datasource.replica.username=${DB_USER:app}
datasource.replica.password=${DB_PASSWORD:app_password}
datasource.replica.pool-size=10
