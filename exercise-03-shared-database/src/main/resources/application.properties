# =============================================================
# Exercise 03 - Shared Database Configuration
# =============================================================
# Same app constraints as Exercise 01/02, but now all app
# servers connect to a SHARED PostgreSQL instead of each
# having their own H2 in-memory database.
#
# This solves the data inconsistency problem from Exercise 02
# but introduces a new bottleneck: the database itself.
# =============================================================

server.port=8080

# --- Tomcat Thread Pool ---
# Same as Exercise 01/02: 50 threads per server.
# With 3 servers, that's 150 total threads hitting ONE database.
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=5
server.tomcat.accept-count=20

# --- Database (Shared PostgreSQL) ---
# All app servers point to the SAME database.
# This is the key change from Exercise 02.
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:5432/productdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:app}
spring.datasource.password=${DB_PASSWORD:app_password}

# JPA / Hibernate
# 'update' mode: creates tables if they don't exist, adds new columns.
# Safe for this exercise. In production, use Flyway or Liquibase.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- HikariCP Connection Pool ---
# Each app server gets 10 connections to PostgreSQL.
# 3 servers × 10 = 30 connections consumed from PostgreSQL's pool.
# 6 servers × 10 = 60 connections — will PostgreSQL handle it?
#
# This is bottleneck #2: the shared connection pool at the DB level.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=AppServer-HikariPool

# --- Actuator ---
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always
