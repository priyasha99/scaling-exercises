# =============================================================
# Exercise 04 - Caching with Redis (Base Configuration)
# =============================================================
# Same shared PostgreSQL setup as Exercise 03, plus Redis.
#
# Without the "replicas" profile, this is Exercise 03 Part A
# (single PostgreSQL) with Redis caching added on top.
# =============================================================

server.port=8080

# --- Tomcat Thread Pool ---
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=5
server.tomcat.accept-count=20

# --- Database (Shared PostgreSQL) ---
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:5432/productdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:app}
spring.datasource.password=${DB_PASSWORD:app_password}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- HikariCP Connection Pool ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=AppServer-HikariPool

# --- Redis ---
# All app servers connect to the SAME Redis instance.
# This means a cache entry written by Server 1 is readable by Server 2.
# Unlike in-memory caching (Caffeine/Guava), the cache is shared.
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.connect-timeout=2000ms

# --- Actuator ---
management.endpoints.web.exposure.include=health,metrics,info,caches
management.endpoint.health.show-details=always
