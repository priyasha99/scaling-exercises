# =============================================================
# Exercise 05 - Stateless Sessions with JWT (No Replicas)
# =============================================================
# Single PostgreSQL + Redis setup for Part A testing.
# JWT_SECRET is shared across all app servers — that's the key
# to stateless auth. Any server can verify any token.
#
# Architecture:
#
#   Client → [ Nginx ] → [ App 1 ] → JWT verify (no DB)
#                       → [ App 2 ] → [ Redis ] (cache + blacklist)
#                       → [ App 3 ] → [ PostgreSQL ]
#
# Usage:
#   docker compose up --build
# =============================================================

services:
  # -------------------------------------------------------
  # PostgreSQL (shared database)
  # -------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c log_min_duration_statement=1000
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d productdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # -------------------------------------------------------
  # Redis (shared cache + JWT blacklist)
  # -------------------------------------------------------
  # Used for TWO purposes in Exercise 05:
  # 1. Data caching (from Exercise 04)
  # 2. JWT token blacklist (new) — stores revoked token IDs
  # -------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    command: >
      redis-server
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # -------------------------------------------------------
  # pgAdmin - Database GUI
  # -------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  # -------------------------------------------------------
  # Nginx Load Balancer
  # -------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  # -------------------------------------------------------
  # App Servers (JWT + Redis caching)
  # -------------------------------------------------------
  # KEY: All servers share the same JWT_SECRET.
  # A token generated by App 1 is valid on App 2 and App 3.
  # No sticky sessions. No shared session store (for auth).
  # -------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      DB_HOST: postgres
      DB_USER: app
      DB_PASSWORD: app_password
      REDIS_HOST: redis
      JWT_SECRET: my-super-secret-key-that-is-at-least-256-bits-long-for-hmac-sha
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/products/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

volumes:
  pgdata:
  pgadmin-data:
