# =============================================================
# Exercise 05 - JWT + Redis + Read Replicas Configuration
# =============================================================
# Full stack: JWT auth + Redis caching + read/write routing.
#
#   Request → JWT valid?
#     NO   → 401 Unauthorized
#     YES  → Redis cache?
#       HIT  → return instantly
#       MISS → ReadWriteRoutingDataSource → primary/replica
#
# Activate with: SPRING_PROFILES_ACTIVE=replicas
# =============================================================

# Exclude auto DataSource — same as Exercise 03
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Disable open-in-view — same as Exercise 03
spring.jpa.open-in-view=false

# JPA settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Primary database (writes)
datasource.primary.jdbc-url=jdbc:postgresql://${DB_PRIMARY_HOST:postgres-primary}:5432/productdb
datasource.primary.username=${DB_USER:app}
datasource.primary.password=${DB_PASSWORD:app_password}
datasource.primary.pool-size=10

# Replica database (reads — only hit on cache MISS)
datasource.replica.jdbc-url=jdbc:postgresql://${DB_REPLICA_HOST:postgres-replica}:5432/productdb
datasource.replica.username=${DB_USER:app}
datasource.replica.password=${DB_PASSWORD:app_password}
datasource.replica.pool-size=10
