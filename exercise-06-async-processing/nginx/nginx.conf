# =============================================================
# Nginx Load Balancer Configuration (same as Exercise 02)
# =============================================================
# Same round-robin load balancing across app servers.
# The database is now the bottleneck, not the app servers.
# =============================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s;

    upstream app_servers {
        server app:8080 max_fails=2 fail_timeout=30s;
    }

    log_format upstream_log '$remote_addr - [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            'upstream: $upstream_addr '
                            'response_time: $upstream_response_time';

    access_log /var/log/nginx/access.log upstream_log;

    server {
        listen 80;

        location /nginx-health {
            return 200 'nginx is running\n';
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass http://app_servers;
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }
    }
}
