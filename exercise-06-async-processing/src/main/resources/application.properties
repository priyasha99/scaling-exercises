# =============================================================
# Exercise 06 - Async Processing with RabbitMQ
# =============================================================
# Builds on Exercise 05 (JWT + Redis caching + replicas).
# Adds RabbitMQ for async product creation — the API responds
# immediately while heavy processing happens in the background.
# =============================================================

server.port=8080

# --- Tomcat Thread Pool ---
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=5
server.tomcat.accept-count=20

# --- Database (Shared PostgreSQL) ---
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:5432/productdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:app}
spring.datasource.password=${DB_PASSWORD:app_password}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- HikariCP Connection Pool ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=AppServer-HikariPool

# --- Redis ---
# All app servers connect to the SAME Redis instance.
# This means a cache entry written by Server 1 is readable by Server 2.
# Unlike in-memory caching (Caffeine/Guava), the cache is shared.
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.connect-timeout=2000ms

# --- JWT Configuration ---
# The secret key used to sign and verify JWT tokens.
# All app servers share this same secret — that's what makes
# tokens valid across any server. No shared session store needed.
jwt.secret=${JWT_SECRET:beF/P6xbwWmyS+K9cqYeAdGpPAL0nhssO5wYRtlJler8EcBOnEuu4bBLThCr1hYV}
jwt.access-token-expiration-ms=900000
jwt.refresh-token-expiration-ms=86400000

# --- RabbitMQ ---
# All app servers connect to the same RabbitMQ instance.
# Producers publish messages, consumers process them in the background.
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# Consumer concurrency — how many messages each server processes in parallel
spring.rabbitmq.listener.simple.concurrency=3
spring.rabbitmq.listener.simple.max-concurrency=5
spring.rabbitmq.listener.simple.prefetch=1

# Async processing mode (sync or async) — toggle for A/B comparison
app.async-enabled=${ASYNC_ENABLED:true}

# --- Actuator ---
management.endpoints.web.exposure.include=health,metrics,info,caches
management.endpoint.health.show-details=always
