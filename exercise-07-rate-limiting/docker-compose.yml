# =============================================================
# Exercise 07 - Rate Limiting and Backpressure
# =============================================================
# Adds distributed rate limiting to the Exercise 06 stack.
# Token bucket algorithm via Redis + Lua scripts.
#
# Rate limit tiers:
#   - Global: 500 burst, 200 req/s (system-wide backpressure)
#   - Per-user: 50 burst, 10 req/s (fair per-user limits)
#   - Per-IP: 30 burst, 5 req/s (unauthenticated traffic)
#   - Admin: 200 burst, 50 req/s (elevated limits)
#
# Usage:
#   docker compose up --build
#
# Without rate limiting (baseline):
#   RATE_LIMIT_ENABLED=false docker compose up --build
# =============================================================

services:
  # -------------------------------------------------------
  # PostgreSQL (shared database)
  # -------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c log_min_duration_statement=1000
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d productdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # -------------------------------------------------------
  # Redis (shared cache + JWT blacklist + async status)
  # -------------------------------------------------------
  # Now also stores async request status (QUEUED/PROCESSING/COMPLETED)
  # with 10-minute TTL for the status polling endpoint.
  # -------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    command: >
      redis-server
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # -------------------------------------------------------
  # RabbitMQ (message broker)
  # -------------------------------------------------------
  # The management plugin gives us a web UI at port 15672.
  # Default credentials: guest/guest
  #
  # Key things to observe in the UI:
  #   - Queues tab: message rates, consumers connected
  #   - product-creation-queue: main queue, messages in/out
  #   - product-creation-dlq: dead letter queue, failed messages
  # -------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"     # AMQP protocol
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # -------------------------------------------------------
  # pgAdmin - Database GUI
  # -------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  # -------------------------------------------------------
  # Nginx Load Balancer
  # -------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  # -------------------------------------------------------
  # App Servers (JWT + Redis + RabbitMQ + Rate Limiting)
  # -------------------------------------------------------
  # Rate limiting runs in the filter chain AFTER JWT auth.
  # All servers share the same Redis buckets — limits are
  # enforced across the cluster, not per-server.
  # -------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      DB_HOST: postgres
      DB_USER: app
      DB_PASSWORD: app_password
      REDIS_HOST: redis
      JWT_SECRET: beF/P6xbwWmyS+K9cqYeAdGpPAL0nhssO5wYRtlJler8EcBOnEuu4bBLThCr1hYV
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      ASYNC_ENABLED: ${ASYNC_ENABLED:-true}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/products/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

volumes:
  pgdata:
  pgadmin-data:
