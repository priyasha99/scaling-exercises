# =============================================================
# Exercise 08 - Database Sharding
# =============================================================
# Hash-based sharding across 2 PostgreSQL instances.
# Shard key: product category.
#
# When SHARDING_ENABLED=true (default):
#   - Data is distributed across postgres-shard-0 and postgres-shard-1
#   - Category hash determines which shard stores each product
#   - Cross-shard queries (search, get all) fan out to both shards
#
# When SHARDING_ENABLED=false (baseline):
#   - Uses only postgres-shard-0 as a single database
#   - Same behavior as Exercise 07
#
# Usage:
#   docker compose up --build                         # sharded (default)
#   SHARDING_ENABLED=false docker compose up --build  # single DB baseline
# =============================================================

services:
  # -------------------------------------------------------
  # PostgreSQL Shard 0
  # -------------------------------------------------------
  # Default shard — also used as the single DB when sharding is off.
  # Stores users table (for authentication) and products for
  # categories that hash to shard 0.
  # -------------------------------------------------------
  postgres-shard-0:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
    ports:
      - "5433:5432"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c log_min_duration_statement=1000
    volumes:
      - shard0data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d productdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # -------------------------------------------------------
  # PostgreSQL Shard 1
  # -------------------------------------------------------
  # Second shard — stores products for categories that hash to
  # shard 1. Schema is created by ShardSchemaInitializer at
  # app startup (Hibernate's ddl-auto only runs on shard-0).
  # -------------------------------------------------------
  postgres-shard-1:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
    ports:
      - "5434:5432"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c log_min_duration_statement=1000
    volumes:
      - shard1data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d productdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # -------------------------------------------------------
  # Redis (shared cache + JWT blacklist + async status + rate limit)
  # -------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    command: >
      redis-server
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # -------------------------------------------------------
  # RabbitMQ (message broker)
  # -------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # -------------------------------------------------------
  # pgAdmin - Database GUI
  # -------------------------------------------------------
  # Add both shards as servers to see data distribution.
  # Shard 0: host=postgres-shard-0, port=5432
  # Shard 1: host=postgres-shard-1, port=5432
  # -------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres-shard-0:
        condition: service_healthy
      postgres-shard-1:
        condition: service_healthy

  # -------------------------------------------------------
  # Nginx Load Balancer
  # -------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  # -------------------------------------------------------
  # App Servers (JWT + Redis + RabbitMQ + Rate Limiting + Sharding)
  # -------------------------------------------------------
  # All 3 servers connect to BOTH shards. The ShardRoutingDataSource
  # routes each query to the correct shard based on ShardContext.
  # -------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      DB_HOST: postgres-shard-0
      DB_USER: app
      DB_PASSWORD: app_password
      REDIS_HOST: redis
      JWT_SECRET: beF/P6xbwWmyS+K9cqYeAdGpPAL0nhssO5wYRtlJler8EcBOnEuu4bBLThCr1hYV
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      ASYNC_ENABLED: ${ASYNC_ENABLED:-true}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      # Sharding config
      SHARDING_ENABLED: ${SHARDING_ENABLED:-true}
      SHARD_0_HOST: postgres-shard-0
      SHARD_1_HOST: postgres-shard-1
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    depends_on:
      postgres-shard-0:
        condition: service_healthy
      postgres-shard-1:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/products/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

volumes:
  shard0data:
  shard1data:
  pgadmin-data:
