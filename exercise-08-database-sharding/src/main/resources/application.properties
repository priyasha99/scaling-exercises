# =============================================================
# Exercise 08 - Database Sharding
# =============================================================
# Builds on Exercise 07 (JWT + Redis + RabbitMQ + Rate Limiting).
# Adds hash-based database sharding across 2 PostgreSQL instances.
# Shard key: category. Algorithm: category.hashCode() % shardCount.
# =============================================================

server.port=8080

# --- Tomcat Thread Pool ---
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=5
server.tomcat.accept-count=20

# --- Default Database (single DB mode / shard-0 fallback) ---
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres-shard-0}:5432/productdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:app}
spring.datasource.password=${DB_PASSWORD:app_password}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- HikariCP Connection Pool ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=AppServer-HikariPool

# --- Sharding Configuration (NEW for Exercise 08) ---
# When enabled, the app uses ShardRoutingDataSource with 2 shards.
# When disabled, the default spring.datasource is used (single DB).
sharding.enabled=${SHARDING_ENABLED:true}
sharding.shard-count=2

# Shard DataSource URLs (only used when sharding.enabled=true)
sharding.shard-0.jdbc-url=jdbc:postgresql://${SHARD_0_HOST:postgres-shard-0}:5432/productdb
sharding.shard-0.username=${DB_USER:app}
sharding.shard-0.password=${DB_PASSWORD:app_password}

sharding.shard-1.jdbc-url=jdbc:postgresql://${SHARD_1_HOST:postgres-shard-1}:5432/productdb
sharding.shard-1.username=${DB_USER:app}
sharding.shard-1.password=${DB_PASSWORD:app_password}

# --- Redis ---
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.connect-timeout=2000ms

# --- JWT Configuration ---
jwt.secret=${JWT_SECRET:beF/P6xbwWmyS+K9cqYeAdGpPAL0nhssO5wYRtlJler8EcBOnEuu4bBLThCr1hYV}
jwt.access-token-expiration-ms=900000
jwt.refresh-token-expiration-ms=86400000

# --- RabbitMQ ---
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

spring.rabbitmq.listener.simple.concurrency=3
spring.rabbitmq.listener.simple.max-concurrency=5
spring.rabbitmq.listener.simple.prefetch=1

app.async-enabled=${ASYNC_ENABLED:true}

# --- Rate Limiting ---
rate-limit.enabled=${RATE_LIMIT_ENABLED:true}
rate-limit.user-capacity=50
rate-limit.user-refill-rate=10.0
rate-limit.admin-capacity=200
rate-limit.admin-refill-rate=50.0
rate-limit.ip-capacity=30
rate-limit.ip-refill-rate=5.0
rate-limit.global-capacity=500
rate-limit.global-refill-rate=200.0

# --- Actuator ---
management.endpoints.web.exposure.include=health,metrics,info,caches
management.endpoint.health.show-details=always
